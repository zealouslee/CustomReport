<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>报表</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css" integrity="sha384-Ujn9oAevd4LxTMAvUP2kXrE9TrNW0kLodmVhqLxkOhMGgNRKceTmR6oxy9/Liy/C" crossorigin="anonymous">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 30%, #0891b2 60%, #06b6d4 100%);
            position: relative;
            animation: fadeIn 0.35s ease;
        }

        /* 背景装饰圆 */
        body::before {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            top: -200px;
            right: -150px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            pointer-events: none;
        }

        /* 网格背景纹理 */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 32px);
        }

        .report-header {
            display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
            animation: slideInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            flex-shrink: 0;
        }
        .report-header .report-title { font-size: 18px; font-weight: 600; color: #1e293b; }
        .filter-row { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-end; position:relative; z-index:1; }
        .filter-item {
            min-width: 260px;
            opacity: 0;
            animation: slideInUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .filter-item:nth-child(1) { animation-delay: 0.06s; }
        .filter-item:nth-child(2) { animation-delay: 0.12s; }
        .filter-item:nth-child(3) { animation-delay: 0.18s; }
        .filter-item:nth-child(4) { animation-delay: 0.24s; }
        .filter-item:nth-child(5) { animation-delay: 0.30s; }
        .filter-item:nth-child(6) { animation-delay: 0.36s; }
        .filter-item:nth-child(7) { animation-delay: 0.42s; }
        .filter-item .layui-form-label {
            width: 100px;
            font-weight: 700;
            text-align: right;
            padding: 9px 10px;
            color: #334155;
        }
        .filter-item .layui-input-block { margin-left: 120px; min-height: 38px; }
        .filter-item .layui-input-block .layui-input { height: 38px; }
        .daterange-box { display:flex; gap:4px; align-items:center; }
        .daterange-box .layui-input { width: 115px; }

        /* 日期范围筛选项加宽以容纳快捷按钮 */
        .filter-item.filter-daterange { min-width: 520px; }

        /* 日期快捷按钮 — 跟在输入框同一行 */
        .date-shortcuts {
            display: flex; gap: 3px; align-items: center; margin-left: 4px;
        }
        .date-shortcuts .shortcut-btn {
            padding: 2px 8px; font-size: 11px; border-radius: 5px;
            border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b;
            cursor: pointer; transition: all .2s ease; white-space: nowrap;
            line-height: 1.5;
        }
        .date-shortcuts .shortcut-btn:hover {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: #fff; border-color: #0891b2;
        }
        .date-shortcuts .shortcut-btn.active {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: #fff; border-color: #0891b2;
        }

        /* 条件格式标签 */
        .cell-tag {
            display: inline-block; padding: 2px 10px; border-radius: 6px;
            font-size: 12px; font-weight: 600; line-height: 1.6;
        }
        .cell-tag-red    { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .cell-tag-orange { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
        .cell-tag-yellow { background: #fefce8; color: #ca8a04; border: 1px solid #fef08a; }
        .cell-tag-green  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .cell-tag-blue   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .cell-tag-gray   { background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; }

        /* 空状态 */
        .table-empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px; color: #94a3b8;
        }
        .table-empty-state .empty-icon {
            font-size: 56px; margin-bottom: 16px; opacity: 0.5;
        }
        .table-empty-state .empty-text {
            font-size: 15px; font-weight: 500; color: #64748b;
        }
        .table-empty-state .empty-hint {
            font-size: 13px; color: #94a3b8; margin-top: 6px;
        }

        /* 按钮 loading 状态 */
        .layui-btn.is-loading {
            opacity: 0.7; pointer-events: none; position: relative;
        }
        .layui-btn.is-loading::after {
            content: ''; display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin .6s linear infinite;
            margin-left: 6px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 点击复制 */
        .copy-trigger {
            cursor: pointer; position: relative;
        }
        .copy-trigger:hover { color: #0891b2; }
        .copy-trigger::after {
            content: '📋'; font-size: 11px; margin-left: 4px; opacity: 0;
            transition: opacity .2s;
        }
        .copy-trigger:hover::after { opacity: 0.7; }
        .copy-toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff; padding: 8px 20px;
            border-radius: 8px; font-size: 13px; z-index: 999999;
            animation: fadeIn .2s ease;
            pointer-events: none;
        }

        /* 列设置面板 */
        .col-toggle-wrap { position: relative; display: inline-block; }
        .col-toggle-panel {
            position: absolute; top: 40px; right: 0; width: 240px;
            background: #fff; border-radius: 12px; padding: 0;
            box-shadow: 0 12px 36px rgba(0,0,0,0.15); z-index: 99999;
            max-height: 400px; overflow-y: auto; display: none;
            border: 1px solid rgba(8,145,178,0.12);
        }
        .col-toggle-panel.show { display: block; }
        .col-toggle-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px; border-bottom: 1px solid #f1f5f9;
            font-size: 13px; font-weight: 600; color: #334155;
        }
        .col-toggle-header .ct-toggle-all {
            font-size: 12px; font-weight: 400; color: #0891b2;
            cursor: pointer; user-select: none;
        }
        .col-toggle-header .ct-toggle-all:hover { text-decoration: underline; }
        .col-toggle-list { padding: 6px 0; }
        .col-toggle-panel label {
            display: flex; align-items: center; gap: 8px; padding: 7px 14px;
            font-size: 13px; color: #334155; cursor: pointer;
            transition: background .15s, box-shadow .15s, opacity .15s;
            user-select: none;
        }
        .col-toggle-panel label:hover { background: #f0f9ff; }
        .col-toggle-panel label.is-hidden {
            color: #94a3b8; text-decoration: line-through;
        }
        .col-toggle-panel label.is-dragging {
            opacity: 0.5; background: #e0f2fe;
            box-shadow: 0 2px 8px rgba(8,145,178,0.2);
        }
        .col-toggle-panel label.drag-over-top {
            border-top: 2px solid #0891b2; padding-top: 5px;
        }
        .col-toggle-panel label.drag-over-bottom {
            border-bottom: 2px solid #0891b2; padding-bottom: 5px;
        }
        /* 拖动手柄 */
        .col-drag-handle {
            cursor: grab; color: #94a3b8; font-size: 14px; flex-shrink: 0;
            display: flex; align-items: center; line-height: 1;
            transition: color .15s;
        }
        .col-drag-handle:hover { color: #0891b2; }
        .col-drag-handle:active { cursor: grabbing; }
        .col-toggle-panel label .col-status {
            margin-left: auto; font-size: 11px; font-weight: 500;
            padding: 1px 6px; border-radius: 4px; flex-shrink: 0;
        }
        .col-toggle-panel label .col-status.show { background: #f0fdf4; color: #16a34a; }
        .col-toggle-panel label .col-status.hide { background: #fef2f2; color: #dc2626; }
        .col-toggle-panel input[type="checkbox"] {
            accent-color: #0891b2; width: 15px; height: 15px; flex-shrink: 0;
        }
        /* 列设置按钮上的隐藏数量角标 */
        .col-hidden-badge {
            display: inline-block; background: #f59e0b; color: #fff;
            font-size: 10px; font-weight: 700; border-radius: 10px;
            padding: 1px 6px; margin-left: 4px; vertical-align: middle;
            line-height: 1.4;
        }

        /* 汇总行 */
        .summary-row {
            display: flex; background: #f8fafc; border-top: 2px solid #e2e8f0;
            font-size: 13px; font-weight: 600; color: #334155;
            flex-shrink: 0;
        }
        .summary-row .summary-cell {
            padding: 8px 15px; border-right: 1px solid #e2e8f0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .summary-row .summary-cell.summary-label {
            background: #e8f4f8; color: #0891b2;
        }

        /* 活跃筛选标签 */
        .active-filters {
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
            margin-bottom: 8px; animation: fadeIn .2s ease;
        }
        .active-filters .af-label {
            font-size: 12px; color: #64748b; font-weight: 600; flex-shrink: 0;
        }
        .af-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 6px; font-size: 12px;
            background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd;
            animation: slideInUp .2s ease;
        }
        .af-chip .af-chip-del {
            margin-left: 2px; font-size: 14px; opacity: 0.5;
            cursor: pointer; line-height: 1;
        }
        .af-chip .af-chip-del:hover { opacity: 1; color: #dc2626; }
        .af-clear-all {
            font-size: 12px; color: #dc2626; cursor: pointer;
            margin-left: 4px; font-weight: 500;
        }
        .af-clear-all:hover { text-decoration: underline; }

        /* 查询耗时 */
        .query-info {
            font-size: 12px; color: #94a3b8; margin-left: auto; flex-shrink: 0;
        }
        .filter-actions {
            display:flex; gap:8px; align-items:center; margin-top:8px; margin-bottom:16px;
            opacity: 0;
            animation: slideInUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) 0.40s forwards;
        }
        .layui-table-view { animation: fadeIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both; }

        /* 毛玻璃卡片 */
        .layui-card {
            overflow: visible !important;
            background: rgba(255,255,255,0.95) !important;
            border-radius: 16px !important;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.08) !important;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2) !important;
            animation: cardIn 0.5s ease-out;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .layui-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            padding: 16px 20px;
            overflow: hidden;
        }

        /* 表格区域内部滚动 */
        .layui-table-view {
            flex: 1;
            min-height: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-width: 100% !important;
            width: 100% !important;
        }
        .layui-table-view .layui-table-body {
            flex: 1;
            min-height: 0;
            overflow: auto !important;
            max-width: 100%;
        }
        .layui-table-page {
            flex-shrink: 0;
        }
        .layui-table-header {
            overflow: hidden !important;
        }
        .layui-form-item,
        .layui-input-block { overflow: visible !important; }
        #filterForm, #filterForm .filter-row { overflow: visible !important; }
        /* 筛选表单叠在 table 之上（区分 table-view 也带 layui-form 类） */
        #filterForm { position: relative; z-index: 101; flex-shrink: 0; }
        /* 下拉框最高 z-index，带阴影突出显示不被遮挡 */
        .layui-form-select .layui-anim-upbit {
            z-index: 99999 !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08) !important;
            border-radius: 10px !important;
            border: 1px solid rgba(8,145,178,0.15) !important;
            background: rgba(255,255,255,0.97) !important;
            backdrop-filter: blur(12px);
            padding: 6px 0 !important;
            /* 覆盖 layui 动画 transform，避免创建额外层叠上下文 */
            animation: none !important;
        }
        .layui-form-select dl {
            border-radius: 10px !important;
            border: none !important;
            box-shadow: none !important;
            margin: 0 !important;
            background: transparent !important;
        }
        .layui-form-select dl dd {
            padding: 0 14px !important;
            line-height: 36px !important;
            height: 36px !important;
            border-radius: 6px !important;
            margin: 2px 6px !important;
            font-size: 14px !important;
            color: #334155 !important;
            transition: background .15s ease, color .15s ease !important;
        }
        .layui-form-select dl dd:hover {
            background: linear-gradient(135deg, rgba(8,145,178,0.1), rgba(6,182,212,0.12)) !important;
            color: #0891b2 !important;
        }
        .layui-form-select dl dd.layui-this {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            color: #fff !important;
            font-weight: 600 !important;
        }
        /* select 输入框统一风格 */
        .layui-form-select .layui-input {
            height: 38px !important;
            border-radius: 10px !important;
            border: 1.5px solid #e2e8f0 !important;
            padding: 0 32px 0 12px !important;
            font-size: 14px !important;
            color: #334155 !important;
            background: #fff !important;
            transition: border-color .2s ease, box-shadow .2s ease !important;
        }
        .layui-form-select.layui-form-selected .layui-input {
            border-color: #0891b2 !important;
            box-shadow: 0 0 0 3px rgba(8,145,178,0.12) !important;
        }
        .layui-form-select .layui-edge {
            border-top-color: #94a3b8 !important;
            transition: transform .25s ease !important;
        }
        .layui-form-select.layui-form-selected .layui-edge {
            border-top-color: #0891b2 !important;
        }
        /* 被打开的 select 所在的 filter-item 提升层级，避免被下方其他 select 覆盖 */
        .layui-form-select.layui-form-selected {
            z-index: 99999 !important;
        }

        /* ========== 日期选择器统一风格 ========== */
        .layui-laydate {
            border-radius: 12px !important;
            border: 1px solid rgba(8,145,178,0.15) !important;
            box-shadow: 0 12px 36px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08) !important;
            background: rgba(255,255,255,0.97) !important;
            backdrop-filter: blur(12px);
            overflow: hidden !important;
        }
        .layui-laydate .layui-laydate-main {
            border-radius: 12px !important;
        }
        /* 日期头部（年月） */
        .layui-laydate-header {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            color: #fff !important;
            padding: 12px 16px !important;
        }
        .layui-laydate-header span {
            color: #fff !important;
            font-weight: 600 !important;
        }
        .layui-laydate-header i {
            color: rgba(255,255,255,0.8) !important;
            transition: color .2s ease !important;
        }
        .layui-laydate-header i:hover {
            color: #fff !important;
        }
        /* 日期内容区 */
        .layui-laydate-content {
            padding: 8px !important;
        }
        .layui-laydate-content table {
            border-collapse: separate !important;
            border-spacing: 2px !important;
        }
        .layui-laydate-content th {
            color: #94a3b8 !important;
            font-weight: 600 !important;
            font-size: 12px !important;
            padding: 6px 0 !important;
        }
        .layui-laydate-content td {
            border-radius: 8px !important;
            transition: background .15s ease, color .15s ease !important;
            font-size: 13px !important;
        }
        .layui-laydate-content td.laydate-day-now {
            color: #0891b2 !important;
            background: rgba(8,145,178,0.08) !important;
        }
        .layui-laydate-content td:hover {
            background: rgba(8,145,178,0.12) !important;
            color: #0891b2 !important;
        }
        .layui-laydate-content td.laydate-selected {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            color: #fff !important;
        }
        .layui-laydate-content td.laydate-selected:hover {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            color: #fff !important;
        }
        /* 日期底部按钮栏 */
        .layui-laydate-bottom {
            border-top: 1px solid #f1f5f9 !important;
            padding: 8px 12px !important;
        }
        .layui-laydate-bottom .layui-btn {
            border-radius: 8px !important;
            font-size: 13px !important;
            height: 32px !important;
            line-height: 32px !important;
            padding: 0 16px !important;
        }
        .layui-laydate-bottom .layui-btn-primary {
            background: #f1f5f9 !important;
            border: none !important;
            color: #475569 !important;
        }
        .layui-laydate-bottom .layui-btn-primary:hover {
            background: #e2e8f0 !important;
        }
        .layui-laydate-bottom .layui-btn-normal {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            border: none !important;
        }
        /* laydate 时间面板统一 */
        .layui-laydate .layui-laydate-content .laydate-time-list {
            border-radius: 8px !important;
        }
        .layui-laydate .layui-laydate-content .laydate-time-list > li {
            border-radius: 6px !important;
        }
        .layui-laydate .layui-laydate-content .laydate-time-list > li p {
            color: #64748b !important;
            font-weight: 600 !important;
            font-size: 12px !important;
        }
        .layui-laydate .layui-laydate-content .laydate-time-list > li ol li:hover {
            background: rgba(8,145,178,0.1) !important;
            color: #0891b2 !important;
        }
        .layui-laydate .layui-laydate-content .laydate-time-list > li ol li.laydate-time-selected {
            background: linear-gradient(135deg, #0891b2, #06b6d4) !important;
            color: #fff !important;
        }
        /* 日期输入框统一风格 */
        .daterange-box .layui-input,
        .filter-item .layui-input {
            height: 38px !important;
            border-radius: 10px !important;
            border: 1.5px solid #e2e8f0 !important;
            padding: 0 12px !important;
            font-size: 14px !important;
            color: #334155 !important;
            background: #fff !important;
            transition: border-color .2s ease, box-shadow .2s ease !important;
        }
        .daterange-box .layui-input:focus,
        .filter-item .layui-input:focus {
            border-color: #0891b2 !important;
            box-shadow: 0 0 0 3px rgba(8,145,178,0.12) !important;
        }

        .layui-table tr:hover {
            background: #e8f4f8 !important;
        }
        /* 斑马纹：偶数行浅灰背景 */
        .layui-table-body table tbody tr:nth-child(even) {
            background: #f8fafc !important;
        }
        .layui-table-body table tbody tr:nth-child(even):hover {
            background: #e8f4f8 !important;
        }

        /* 表格高度切换 */
        .density-wrap { position: relative; display: inline-block; }
        .density-panel {
            position: absolute; top: 40px; right: 0; width: 120px;
            background: #fff; border-radius: 10px; padding: 6px 0;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); z-index: 99999;
            display: none; border: 1px solid rgba(8,145,178,0.12);
        }
        .density-panel.show { display: block; }
        .density-panel .density-opt {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; font-size: 13px; color: #334155;
            cursor: pointer; transition: background .15s;
        }

<script>
layui.use(['form', 'table', 'laydate', 'layer'], function () {
    const form = layui.form;
    const table = layui.table;
    const laydate = layui.laydate;
    const layer = layui.layer;

    const reportCode = "{:htmlspecialchars($code)}";
    const csrfToken = "{:session('__token__')}";
    let reportCfg = null;

    // HTML 转义工具函数，防止 XSS
    function escapeHtml(str) {
        if (str == null) return '';
        const div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
    }

    // 点击复制到剪贴板
    function copyToClipboard(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showCopyToast());
        } else {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            showCopyToast();
        }
    }
    function showCopyToast(msg) {
        const t = document.createElement('div');
        t.className = 'copy-toast'; t.textContent = msg || '已复制到剪贴板';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1500);
    }

    // 双击任意表格单元格复制
    document.addEventListener('dblclick', function(e) {
        const cell = e.target.closest('.layui-table-cell');
        if (!cell) return;
        // 排除序号列（type=numbers 的列内容为行号）
        const td = cell.closest('td');
        if (td && td.getAttribute('data-field') === '0') return;
        const text = cell.textContent.trim();
        if (text) copyToClipboard(text);
    });

    // 表格加载遮罩
    function showTableLoading() {
        hideTableLoading();
        const card = document.querySelector('.layui-card-body');
        if (!card) return;
        card.style.position = 'relative';
        const overlay = document.createElement('div');
        overlay.className = 'table-loading-overlay';
        overlay.id = 'tableLoadingOverlay';
        overlay.innerHTML = '<div class="table-loading-inner"><div class="table-loading-spinner"></div><div class="table-loading-text">数据加载中...</div></div>';
        card.appendChild(overlay);
    }
    function hideTableLoading() {
        const el = document.getElementById('tableLoadingOverlay');
        if (el) el.remove();
    }

    // 表格高度管理
    let tableDensity = localStorage.getItem('table_density') || 'normal';
    function densityToSize(mode) {
        // 映射到 layui table size 参数
        return mode === 'compact' ? 'sm' : (mode === 'loose' ? 'lg' : undefined);
    }
    function applyDensity(mode) {
        tableDensity = mode;
        localStorage.setItem('table_density', mode);
        // 更新面板active状态
        document.querySelectorAll('.density-opt').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.mode === mode);
        });
    }
    // 判断是否为可复制字段（手机号、身份证等）
    function isCopyableField(fieldName) {
        const patterns = ['phone', 'mobile', 'idcard', '身份证', '电话', '手机', 'Phone', 'IDCard', 'IDCardNo', 'PatientCode', '体检号'];
        return patterns.some(p => fieldName.toLowerCase().includes(p.toLowerCase()));
    }

    // 列可见性管理
    let colVisibility = {};  // { field: true/false }
    let colOrder = [];        // [field1, field2, ...] 拖动排序后的列顺序
    function loadColVisibility() {
        try {
            const saved = localStorage.getItem('col_vis_' + reportCode);
            if (saved) colVisibility = JSON.parse(saved);
            const orderSaved = localStorage.getItem('col_order_' + reportCode);
            if (orderSaved) colOrder = JSON.parse(orderSaved);
        } catch(e) {}
    }
    function saveColVisibility() {
        localStorage.setItem('col_vis_' + reportCode, JSON.stringify(colVisibility));
        localStorage.setItem('col_order_' + reportCode, JSON.stringify(colOrder));
    }



    function buildInput(filter) {
        const name = filter.param_name;
        const labelText = filter.label || name;
        const type = (filter.form_type || 'text').toLowerCase();
        const required = String(filter.required) === '1';
        const defVal = filter.default_value ?? '';

        const wrap = document.createElement('div');
        wrap.className = 'layui-form-item filter-item';

        const label = document.createElement('label');
        label.className = 'layui-form-label';
        if (required) {
            const mark = document.createElement('span');
            mark.style.color = '#FF5722';
            mark.textContent = '*';
            label.appendChild(mark);
        }
        label.appendChild(document.createTextNode(labelText));

        const inputBlock = document.createElement('div');
        inputBlock.className = 'layui-input-block';
        inputBlock.id = 'wrap_' + name;

        wrap.appendChild(label);
        wrap.appendChild(inputBlock);

        const host = inputBlock;

        if (type === 'select') {
            const sel = document.createElement('select');
            sel.name = name;
            sel.setAttribute('lay-filter', name);
            sel.setAttribute('lay-search', '');
            // 默认空选项，不传值
            const emptyOpt = document.createElement('option');
            emptyOpt.value = '';
            emptyOpt.textContent = '请选择';
            sel.appendChild(emptyOpt);
            (filter.options || []).forEach(opt => {
                const o = document.createElement('option');
                o.value = opt.value;
                o.textContent = opt.label ?? opt.value;
                sel.appendChild(o);
            });
            host.appendChild(sel);
            return wrap;
        }

        const input = document.createElement('input');
        input.className = 'layui-input';
        input.name = name;
        input.placeholder = '请输入' + labelText;
        input.value = defVal;

        if (type === 'date') {
            input.id = 'd_' + name;
            host.appendChild(input);
            laydate.render({ elem: '#' + input.id, type: 'date' });
            return wrap;
        }

        if (type === 'datetime') {
            input.id = 'dt_' + name;
            host.appendChild(input);
            laydate.render({ elem: '#' + input.id, type: 'datetime' });
            return wrap;
        }

        if (type === 'daterange') {
            // 日期范围选择：开始日期 + 结束日期 + 快捷按钮同行
            wrap.classList.add('filter-daterange');
            const box = document.createElement('div');
            box.className = 'daterange-box';

            const inputStart = document.createElement('input');
            inputStart.className = 'layui-input';
            inputStart.name = name + '_start';
            inputStart.id = 'drs_' + name;
            inputStart.placeholder = '开始日期';
            inputStart.autocomplete = 'off';

            const sep = document.createElement('span');
            sep.style.cssText = 'padding:0 4px;color:#999;';
            sep.textContent = '～';

            const inputEnd = document.createElement('input');
            inputEnd.className = 'layui-input';
            inputEnd.name = name + '_end';
            inputEnd.id = 'dre_' + name;
            inputEnd.placeholder = '结束日期';
            inputEnd.autocomplete = 'off';

            box.appendChild(inputStart);
            box.appendChild(sep);
            box.appendChild(inputEnd);

            // 日期快捷按钮（与输入框同一行）
            const shortcuts = document.createElement('div');
            shortcuts.className = 'date-shortcuts';
            const shortcutDefs = [
                { label: '今天', start: () => new Date(), end: () => new Date() },
                { label: '昨天', start: () => { const d = new Date(); d.setDate(d.getDate()-1); return d; }, end: () => { const d = new Date(); d.setDate(d.getDate()-1); return d; } },
                { label: '本周', start: () => { const d = new Date(); const day = d.getDay() || 7; d.setDate(d.getDate() - day + 1); return d; }, end: () => new Date() },
                { label: '本月', start: () => { const d = new Date(); d.setDate(1); return d; }, end: () => new Date() },
                { label: '本季度', start: () => { const d = new Date(); const q = Math.floor(d.getMonth()/3); d.setMonth(q*3, 1); return d; }, end: () => new Date() },
                { label: '本年', start: () => { const d = new Date(); d.setMonth(0, 1); return d; }, end: () => new Date() },
            ];
            shortcutDefs.forEach(def => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'shortcut-btn';
                btn.textContent = def.label;
                btn.addEventListener('click', function() {
                    const fmt = d => d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                    inputStart.value = fmt(def.start());
                    inputEnd.value = fmt(def.end());
                    shortcuts.querySelectorAll('.shortcut-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
                shortcuts.appendChild(btn);
            });
            box.appendChild(shortcuts);

            host.appendChild(box);

            return wrap;
        }

        host.appendChild(input);
        return wrap;
    }

    function getFormParams() {
        const fd = new FormData(document.getElementById('filterForm'));
        const obj = {};
        for (const [k, v] of fd.entries()) {
            if (v !== null && v !== '') obj[k] = v;
        }
        return obj;
    }

    // 渲染活跃筛选条件标签
    function renderActiveFilters() {
        const container = document.getElementById('activeFilters');
        const params = getFormParams();
        const keys = Object.keys(params);
        container.innerHTML = '';
        if (keys.length === 0) { container.style.display = 'none'; return; }
        container.style.display = 'flex';

        const label = document.createElement('span');
        label.className = 'af-label';
        label.textContent = '当前筛选:';

        keys.forEach(k => {
            // 查找对应的 filter 配置获取友好名称
            const f = filterMap[k];
            const chip = document.createElement('span');
            chip.className = 'af-chip';
            chip.textContent = (f ? f.label : k) + ': ' + params[k];
            const del = document.createElement('span');
            del.className = 'af-chip-del'; del.textContent = '×';

                    if (el.tagName === 'SELECT') { el.selectedIndex = 0; form.render('select'); }
                    else el.value = '';
                    // 清除日期范围相关的 _start/_end 也需处理
                }
                renderActiveFilters();
                table.reload('reportTable', {
                    where: Object.assign({ code: reportCode }, getFormParams()),
                    page: { curr: 1 }
                });

            chip.appendChild(del);

            clearAll.addEventListener('click', function() {
                document.getElementById('btnReset').click();
                table.reload('reportTable', {
                    where: { code: reportCode },
                    page: { curr: 1 }
                });
            });
            container.appendChild(clearAll);
        }
    }

    // 查询耗时追踪
    let queryStartTime = 0;

    // 行详情抽屉
    function openDrawer(rowData) {

    /**
     * 当报表内容不铺满全屏时，列宽自适应内容宽度
     * 在 table done 回调中调用，测量每列实际内容宽度，
     * 如果所有列内容总宽度 < 容器宽度，则将表格容器收缩到内容宽度
     */
    function autoFitColumns() {
        const tableView = document.querySelector('.layui-table-view[lay-id="reportTable"]');
        if (!tableView) return;

        const tableHeader = tableView.querySelector('.layui-table-header table');
        const tableBody = tableView.querySelector('.layui-table-body table');
        if (!tableHeader && !tableBody) return;

        const containerWidth = tableView.clientWidth;

        // 测量每列的内容宽度（取表头和单元格中的最大值）
        const colsWidths = [];
        const colCount = tableHeader
            ? tableHeader.querySelectorAll('thead th').length
            : (tableBody ? tableBody.querySelectorAll('tbody tr:first-child td').length : 0);

        for (let i = 0; i < colCount; i++) {
            let maxW = 0;
            // 测量表头
            if (tableHeader) {
                const th = tableHeader.querySelectorAll('thead th')[i];
                if (th) {
                    const thInner = th.querySelector('.layui-table-cell');
                    if (thInner) maxW = Math.max(maxW, thInner.scrollWidth);
                }
            }
            // 测量前 50 行数据单元格（避免大数据量时性能问题）
            if (tableBody) {
                const rows = tableBody.querySelectorAll('tbody tr');
                const limit = Math.min(rows.length, 50);
                for (let r = 0; r < limit; r++) {
                    const td = rows[r].querySelectorAll('td')[i];
                    if (td) {
                        const tdInner = td.querySelector('.layui-table-cell');
                        if (tdInner) maxW = Math.max(maxW, tdInner.scrollWidth);
                    }
                }
            }
            // 加上单元格内边距（左右各约 15px）
            colsWidths.push(maxW + 30);
        }

        const totalContentWidth = colsWidths.reduce((s, w) => s + w, 0);

        if (totalContentWidth < containerWidth) {
            // 内容不足一屏，设置每列为内容宽度
            tableView.classList.add('auto-fit');

            const headerThs = tableHeader ? tableHeader.querySelectorAll('thead th') : [];
            const bodyRows = tableBody ? tableBody.querySelectorAll('tbody tr') : [];

            for (let i = 0; i < colsWidths.length; i++) {
                const w = colsWidths[i] + 'px';
                if (headerThs[i]) {
                    headerThs[i].style.width = w;
                    const hCell = headerThs[i].querySelector('.layui-table-cell');
                    if (hCell) hCell.style.width = w;
                }
                for (let r = 0; r < bodyRows.length; r++) {
                    const td = bodyRows[r].querySelectorAll('td')[i];
                    if (td) {
                        td.style.width = w;
                        const bCell = td.querySelector('.layui-table-cell');
                        if (bCell) bCell.style.width = w;
                    }
                }
            }

            // 同步固定列区域宽度
            const fixedLeft = tableView.querySelector('.layui-table-fixed');
            if (fixedLeft) {
                let fixedW = 0;
                const fixedThs = fixedLeft.querySelectorAll('.layui-table-header thead th');
                for (let i = 0; i < fixedThs.length; i++) {
                    fixedW += colsWidths[i] || 0;
                    fixedThs[i].style.width = (colsWidths[i] || 0) + 'px';
                }
            }
        } else {
            tableView.classList.remove('auto-fit');
            // 内容超出容器时，给内部 table 设置显式宽度以触发水平滚动
            const headerTable = tableView.querySelector('.layui-table-header table');
            const bodyTable = tableView.querySelector('.layui-table-body table');
            const totalW = totalContentWidth + 'px';
            if (headerTable) {
                headerTable.style.width = totalW;
                headerTable.style.minWidth = totalW;
            }
            if (bodyTable) {
                bodyTable.style.width = totalW;
                bodyTable.style.minWidth = totalW;
            }
        }
    }

    // 初始化列顺序（首次使用时按原始顺序）
    function initColOrder(cols) {
        if (colOrder.length === 0 || colOrder.length !== cols.length) {
            // 新增列追加到末尾，移除已不存在的列
            const fields = cols.map(c => c.field);
            colOrder = colOrder.filter(f => fields.includes(f));
            fields.forEach(f => { if (!colOrder.includes(f)) colOrder.push(f); });
        }
    }

    // 按 colOrder 对列数组排序
    function sortByOrder(cols) {
        return [...cols].sort((a, b) => {
            const ai = colOrder.indexOf(a.field);
            const bi = colOrder.indexOf(b.field);
            return (ai === -1 ? 9999 : ai) - (bi === -1 ? 9999 : bi);
        });
    }

    // 构建列设置面板（复选框列表 + 拖动排序）
    function buildColTogglePanel(cols) {
        initColOrder(cols);
        const panel = document.getElementById('colTogglePanel');
        panel.innerHTML = '';

        // 头部：显示数量 + 全选/取消全选
        const header = document.createElement('div');
        header.className = 'col-toggle-header';
        const headerInfo = document.createElement('span');
        headerInfo.id = 'colToggleInfo';
        const toggleAll = document.createElement('span');
        toggleAll.className = 'ct-toggle-all';
        toggleAll.textContent = '取消全选';
        toggleAll.addEventListener('click', function() {
            const allChecked = cols.every(c => colVisibility[c.field] !== false);
            cols.forEach(c => { colVisibility[c.field] = !allChecked; });
            saveColVisibility();
            buildColTogglePanel(cols);
            renderTable(reportCfg.cols || [], reportCfg.report.default_limit);
        });
        header.appendChild(headerInfo);
        header.appendChild(toggleAll);
        panel.appendChild(header);

        // 列表容器
        const list = document.createElement('div');
        list.className = 'col-toggle-list';

        // 按 colOrder 排序后渲染
        const orderedCols = sortByOrder(cols);
        let dragSrcField = null;

        orderedCols.forEach(c => {
            if (colVisibility[c.field] === undefined) colVisibility[c.field] = true;
            const isVisible = colVisibility[c.field] !== false;

            const label = document.createElement('label');
            label.draggable = true;
            label.dataset.field = c.field;
            if (!isVisible) label.className = 'is-hidden';

            // 拖动手柄
            const handle = document.createElement('span');
            handle.className = 'col-drag-handle';
            handle.title = '拖动排序';
            handle.innerHTML = '&#8942;&#8942;'; // ⋮⋮

            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = isVisible;
            cb.addEventListener('change', function() {
                colVisibility[c.field] = cb.checked;
                saveColVisibility();
                if (cb.checked) {
                    label.classList.remove('is-hidden');
                    statusSpan.className = 'col-status show'; statusSpan.textContent = '显示';
                } else {
                    label.classList.add('is-hidden');
                    statusSpan.className = 'col-status hide'; statusSpan.textContent = '隐藏';
                }
                updateColToggleInfo(cols);
                renderTable(reportCfg.cols || [], reportCfg.report.default_limit);
            });

            const nameSpan = document.createElement('span');
            nameSpan.textContent = c.title || c.field;
            nameSpan.style.flex = '1';

            const statusSpan = document.createElement('span');
            statusSpan.className = 'col-status ' + (isVisible ? 'show' : 'hide');
            statusSpan.textContent = isVisible ? '显示' : '隐藏';

            label.appendChild(handle);
            label.appendChild(cb);
            label.appendChild(nameSpan);
            label.appendChild(statusSpan);

            // 拖动事件
            label.addEventListener('dragstart', function(e) {
                dragSrcField = c.field;
                label.classList.add('is-dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', c.field);
            });
            label.addEventListener('dragend', function() {
                label.classList.remove('is-dragging');
                list.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
                    el.classList.remove('drag-over-top', 'drag-over-bottom');
                });
            });
            label.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const rect = label.getBoundingClientRect();
                const mid = rect.top + rect.height / 2;
                list.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(el => {
                    el.classList.remove('drag-over-top', 'drag-over-bottom');
                });
                if (e.clientY < mid) {
                    label.classList.add('drag-over-top');
                } else {
                    label.classList.add('drag-over-bottom');
                }
            });
            label.addEventListener('dragleave', function() {
                label.classList.remove('drag-over-top', 'drag-over-bottom');
            });
            label.addEventListener('drop', function(e) {
                e.preventDefault();
                label.classList.remove('drag-over-top', 'drag-over-bottom');
                const srcField = e.dataTransfer.getData('text/plain');
                if (!srcField || srcField === c.field) return;
                const srcIdx = colOrder.indexOf(srcField);
                const tgtIdx = colOrder.indexOf(c.field);
                if (srcIdx === -1 || tgtIdx === -1) return;
                // 从原位置移除
                colOrder.splice(srcIdx, 1);
                // 计算插入位置
                const rect = label.getBoundingClientRect();
                const mid = rect.top + rect.height / 2;
                const newTgtIdx = colOrder.indexOf(c.field);
                if (e.clientY < mid) {
                    colOrder.splice(newTgtIdx, 0, srcField);
                } else {
                    colOrder.splice(newTgtIdx + 1, 0, srcField);
                }
                saveColVisibility();
                buildColTogglePanel(cols);
                renderTable(reportCfg.cols || [], reportCfg.report.default_limit);
            });

            list.appendChild(label);
        });

        panel.appendChild(list);
        updateColToggleInfo(cols);
    }

    // 更新列设置面板头部信息和按钮角标
    function updateColToggleInfo(cols) {
        const total = cols.length;
        const visible = cols.filter(c => colVisibility[c.field] !== false).length;
        const hidden = total - visible;
        const infoEl = document.getElementById('colToggleInfo');
        if (infoEl) infoEl.textContent = '显示 ' + visible + ' / ' + total + ' 列';
        // 更新按钮文本和角标
        const btn = document.getElementById('btnColToggle');
        if (btn) {
            // 移除旧角标
            const oldBadge = btn.querySelector('.col-hidden-badge');
            if (oldBadge) oldBadge.remove();
            if (hidden > 0) {
                const badge = document.createElement('span');
                badge.className = 'col-hidden-badge';
                badge.textContent = hidden + '列隐藏';
                btn.appendChild(badge);
            }
        }
        // 更新全选/取消全选文本
        const toggleAll = document.querySelector('.ct-toggle-all');
        if (toggleAll) toggleAll.textContent = visible === total ? '取消全选' : '全选';
    }

    function renderTable(cols, defaultLimit) {
        // 动态计算表格可用高度，让表格在卡片内部滚动而非浏览器滚动
        const cardBody = document.querySelector('.layui-card-body');
        const header = document.querySelector('.report-header');
        const form = document.getElementById('filterForm');
        const usedHeight = (header ? header.offsetHeight : 0)
            + (form ? form.offsetHeight : 0)
            + 32; // card-body padding
        const tableHeight = Math.max(300, cardBody.clientHeight - usedHeight);

        // 过滤隐藏列并按拖动顺序排序
        const visibleCols = sortByOrder(cols.filter(c => colVisibility[c.field] !== false));

        table.render({
            elem: '#reportTable',
            url: '/backend/api/report/data',
            method: 'get',
            where: Object.assign({ code: reportCode }, getFormParams()),
            page: true,
            limit: defaultLimit || 20,
            size: densityToSize(tableDensity),
            height: tableHeight,
            cols: [[
                { type: 'numbers', title: '序号', width: 70 },
                ...visibleCols.map(c => ({
                field: c.field,
                title: c.title || c.field,
                width: c.width || undefined,
                sort: !!c.sort,
                templet: function (d) {
                    // 把 Unix 时间戳格式化为可读日期
                    if (c.field === 'create_time' && d[c.field] && typeof d[c.field] === 'number') {
                        const dt = new Date(d[c.field] * 1000);
                        return dt.getFullYear() + '-' +
                            String(dt.getMonth() + 1).padStart(2, '0') + '-' +
                            String(dt.getDate()).padStart(2, '0') + ' ' +
                            String(dt.getHours()).padStart(2, '0') + ':' +
                            String(dt.getMinutes()).padStart(2, '0') + ':' +
                            String(dt.getSeconds()).padStart(2, '0');
                    }
                    const rawVal = d[c.field];
                    // 条件格式：根据列配置的 highlight 规则渲染颜色标签
                    if (c.highlight && rawVal != null && rawVal !== '') {
                        const strVal = String(rawVal).trim();
                        for (const rule of c.highlight) {
                            const match = (rule.match || []).map(m => String(m).trim());
                            if (match.includes(strVal)) {
                                return '<span class="cell-tag cell-tag-' + escapeHtml(rule.color) + '">' + escapeHtml(rawVal) + '</span>';
                            }
                        }
                    }
                    // HTML 转义防止 XSS
                    const escaped = escapeHtml(rawVal);
                    // 可复制字段（手机号、身份证等）添加点击复制
                    if (isCopyableField(c.field) && rawVal != null && rawVal !== '') {
                        return '<span class="copy-trigger" onclick="copyToClipboard(\'' + escapeHtml(String(rawVal).replace(/'/g, "\\'")) + '\')">' + escaped + '</span>';
                    }
                    return escaped;
                }
            }))
            ]],
            done: function(res) {
                // 确保 table-body 可水平滚动
                var tvFix = document.querySelector('.layui-table-view[lay-id="reportTable"]');
                if (tvFix) {
                    var bodyFix = tvFix.querySelector('.layui-table-body');
                    if (bodyFix) {
                        bodyFix.style.overflowX = 'auto';
                    }
                }
                // 显示查询耗时
                const elapsed = queryStartTime ? Date.now() - queryStartTime : 0;
                const infoEl = document.getElementById('queryInfo');
                if (infoEl) {
                    infoEl.textContent = '共 ' + (res.count || 0).toLocaleString() + ' 条'
                        + (elapsed > 0 ? '，耗时 ' + elapsed + 'ms' : '');
                }
                autoFitColumns();
                hideTableLoading();
                applyDensity(tableDensity);
                // 空状态提示
                const tableView = document.querySelector('.layui-table-view[lay-id="reportTable"]');
                if (tableView) {
                    // 清除旧的空状态和汇总行
                    tableView.querySelectorAll('.table-empty-state, .summary-row').forEach(el => el.remove());
                    if (res.count === 0) {
                        const emptyDiv = document.createElement('div');
                        emptyDiv.className = 'table-empty-state';
                        emptyDiv.innerHTML = '<div class="empty-icon">📭</div><div class="empty-text">未找到符合条件的数据</div><div class="empty-hint">请调整查询条件后重新查询</div>';
                        const tbody = tableView.querySelector('.layui-table-body');
                        if (tbody) tbody.appendChild(emptyDiv);
                    } else if (res.data && res.data.length > 0) {
                        // 汇总行：数值列求和
                        const summaryCols = (reportCfg.cols || []).filter(c => colVisibility[c.field] !== false);
                        const data = res.data;
                        const summaryDiv = document.createElement('div');
                        summaryDiv.className = 'summary-row';
                        // 序号列
                        const labelCell = document.createElement('div');
                        labelCell.className = 'summary-cell summary-label';
                        labelCell.style.width = '70px'; labelCell.style.minWidth = '70px';
                        labelCell.textContent = '合计';
                        summaryDiv.appendChild(labelCell);
                        summaryCols.forEach(c => {
                            const cell = document.createElement('div');
                            cell.className = 'summary-cell';
                            cell.style.width = (c.width || 120) + 'px';
                            cell.style.minWidth = (c.width || 80) + 'px';
                            // 检测是否为数值列
                            let isNumeric = true, sum = 0, hasData = false;
                            data.forEach(row => {
                                const v = row[c.field];
                                if (v == null || v === '') return;
                                const n = Number(v);
                                if (isNaN(n)) { isNumeric = false; return; }
                                sum += n; hasData = true;
                            });
                            if (isNumeric && hasData && sum !== 0) {
                                cell.textContent = Number.isInteger(sum) ? sum.toLocaleString() : sum.toLocaleString(undefined, {maximumFractionDigits: 2});
                            }
                            summaryDiv.appendChild(cell);
                        });
                        tableView.appendChild(summaryDiv);
                    }
                }
                // 行点击打开详情抽屉
                const tbody = tableView ? tableView.querySelector('.layui-table-body tbody') : null;
                if (tbody && res.data) {
                    tbody.querySelectorAll('tr').forEach(tr => {
                        tr.style.cursor = 'pointer';
                        tr.addEventListener('click', function() {
                            const idx = parseInt(tr.getAttribute('data-index'));
                            if (!isNaN(idx) && res.data[idx]) openDrawer(res.data[idx]);
                        });
                    });
                }
            },
        });
    }

    // 筛选器数据缓存，供联动使用
    const filterMap = {};

    async function init() {
        try {
            const res = await fetch('/backend/api/report/config?code=' + encodeURIComponent(reportCode));
            if (!res.ok) {
                layer.msg('加载配置失败 (HTTP ' + res.status + ')');
                return;
            }
            const json = await res.json();
            if (json.code !== 0) {
                layer.msg(json.msg || '加载配置失败');
                return;
            }
            reportCfg = json.data;
            document.getElementById('reportTitle').textContent = reportCfg.report.name + '（' + reportCfg.report.code + '）';

            const row = document.getElementById('filterRow');
            row.innerHTML = '';
            const dateRangeNames = [];
            (reportCfg.filters || []).forEach(f => {
                filterMap[f.param_name] = f; // 缓存
                row.appendChild(buildInput(f));
                if (f.form_type === 'daterange') dateRangeNames.push(f.param_name);
            });

            form.render();

            // 初始化 select 层叠管理观察器
            initSelectStackingObserver();
            manageSelectStacking();

            // 修复 select 下拉框被挡住：强制所有父容器不裁剪
            function fixSelectOverflow() {
                document.querySelectorAll('.layui-form-select').forEach(function (el) {
                    // 确保 dl 下拉框 z-index 最高
                    var dl = el.querySelector('.layui-anim-upbit');
                    if (dl) {
                        dl.style.setProperty('z-index', '99999', 'important');
                    }
                    // 遍历所有父容器强制 overflow:visible
                    var p = el.parentElement;
                    while (p && p !== document.body) {
                        if (p.style) {
                            p.style.setProperty('overflow', 'visible', 'important');
                        }
                        p = p.parentElement;
                    }
                });
            }
            fixSelectOverflow();
            // layui 渲染后延迟再执行一次确保覆盖
            setTimeout(fixSelectOverflow, 100);

            // 设置二级联动
            (reportCfg.filters || []).forEach(f => {
                if (f.depends_on) {
                    const childEl = document.querySelector('select[name="' + f.param_name + '"]');
                    if (childEl) {
                        // 使用 layui 的 select 事件，保证在 layui 渲染后正确触发
                        form.on('select(' + f.depends_on + ')', function (data) {
                            rebuildCascadeSelect(childEl, f.param_name, data.value);
                        });
                        // 初始加载时，如果有默认选中值也触发联动
                        const parentEl = document.querySelector('select[name="' + f.depends_on + '"]');
                        if (parentEl && parentEl.value) {
                            rebuildCascadeSelect(childEl, f.param_name, parentEl.value);
                        }
                    }
                }
            });

            // 日期范围输入框初始化 laydate（必须在 DOM 追加后调用）
            dateRangeNames.forEach(function (name) {
                laydate.render({ elem: '#drs_' + name, type: 'date' });
                laydate.render({ elem: '#dre_' + name, type: 'date' });
            });
            // 初始化列可见性复选框面板
            buildColTogglePanel(reportCfg.cols || []);

            queryStartTime = Date.now();
            showTableLoading();
            renderTable(reportCfg.cols || [], reportCfg.report.default_limit);

            // 表格渲染完后再次修复 select 下拉框，防止表格渲染重设 overflow
            setTimeout(fixSelectOverflow, 50);
        } catch (e) {
            layer.msg('加载报表失败: ' + e.message);
        }
    }

    /** 按父级值重建联动下拉选项（调用服务端 API） */
    async function rebuildCascadeSelect(sel, paramName, parentValue) {
        // 记住当前选中值
        const oldVal = sel.value;
        // 保留第一项（请选择）
        while (sel.options.length > 1) {
            sel.remove(1);
        }
        if (!parentValue) {
            form.render('select');
            return;
        }
        try {
            const url = '/backend/api/report/filterOptions?code=' + encodeURIComponent(reportCode)
                + '&param_name=' + encodeURIComponent(paramName)
                + '&parent_value=' + encodeURIComponent(parentValue);
            const res = await fetch(url);
            const json = await res.json();
            if (json.code === 0 && json.data) {
                json.data.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt.value;
                    o.textContent = opt.label ?? opt.value;
                    sel.appendChild(o);
                });
            }
        } catch (e) {
            console.error('加载联动选项失败', e);
        }
        // 恢复选中（如果之前的选项仍然可见）
        if (oldVal) {
            for (let i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value === oldVal) {
                    sel.selectedIndex = i;
                    break;
                }
            }
        }
        form.render('select');
    }

    form.on('submit(doSearch)', function () {
        queryStartTime = Date.now();
        renderActiveFilters();
        showTableLoading();
        table.reload('reportTable', {
            where: Object.assign({ code: reportCode }, getFormParams()),
            page: { curr: 1 }
        });
        return false;
    });

    // 重置按钮：清空所有筛选条件
    document.getElementById('btnReset').addEventListener('click', function () {
        const filterForm = document.getElementById('filterForm');
        // 清空所有 input
        filterForm.querySelectorAll('input[type="text"], input:not([type])').forEach(function(inp) {
            inp.value = '';
        });
        // 清空所有 select
        filterForm.querySelectorAll('select').forEach(function(sel) {
            sel.selectedIndex = 0;
        });
        // 清除日期快捷按钮 active 状态
        filterForm.querySelectorAll('.shortcut-btn.active').forEach(function(btn) {
            btn.classList.remove('active');
        });
        // 重新渲染 layui 表单组件
        form.render('select');
        // 清除活跃筛选标签
        renderActiveFilters();
    });

    // 刷新按钮：不重置筛选，重新查询
    document.getElementById('btnRefresh').addEventListener('click', function() {
        queryStartTime = Date.now();
        showTableLoading();
        renderActiveFilters();
        table.reload('reportTable', {
            where: Object.assign({ code: reportCode }, getFormParams()),
            page: { curr: 1 }
        });
    });

    // 高度切换
    document.getElementById('btnDensity').addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('densityPanel').classList.toggle('show');
    });
    document.querySelectorAll('.density-opt').forEach(opt => {
        opt.addEventListener('click', function() {
            const mode = opt.dataset.mode;
            applyDensity(mode);
            document.getElementById('densityPanel').classList.remove('show');
            table.reload('reportTable', { size: densityToSize(mode) });
        });
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.density-wrap')) {
            document.getElementById('densityPanel').classList.remove('show');
        }
    });
    // 初始化高度
    applyDensity(tableDensity);

    // 导出按钮：加 loading 状态
    document.getElementById('btnExport').addEventListener('click', function () {
        const btn = this;
        btn.classList.add('is-loading');
        btn.disabled = true;
        const origText = btn.textContent;
        btn.textContent = '导出中';
        const params = new URLSearchParams(Object.assign({ code: reportCode }, getFormParams()));

        fetch('/backend/api/report/export?' + params.toString())
            .then(function(res) {
                if (!res.ok) {
                    return res.json().then(function(j) { throw new Error(j.msg || '导出失败'); });
                }
                // 从 Content-Disposition 提取文件名（优先 RFC 5987 filename*）
                const cd = res.headers.get('Content-Disposition') || '';
                let filename = 'export.csv';
                const starMatch = cd.match(/filename\*=UTF-8''([^;\s]+)/i);
                if (starMatch) {
                    filename = decodeURIComponent(starMatch[1]);
                } else {
                    const plainMatch = cd.match(/filename="?([^";\n]+)"?/i);
                    if (plainMatch) filename = decodeURIComponent(plainMatch[1]);
                }
                return res.blob().then(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
                });
            })
            .catch(function(err) {
                alert(err.message || '导出失败');
            })
            .finally(function() {
                btn.classList.remove('is-loading');
                btn.disabled = false;
                btn.textContent = origText;
            });
    });


    // 列设置面板
    document.getElementById('btnColToggle').addEventListener('click', function(e) {
        e.stopPropagation();
        const panel = document.getElementById('colTogglePanel');
        panel.classList.toggle('show');
    });
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.col-toggle-wrap')) {
            document.getElementById('colTogglePanel').classList.remove('show');
        }
    });

    // 初始化列可见性
    loadColVisibility();

    init();

    // 窗口大小变化时重新计算表格高度
    let resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
            const cardBody = document.querySelector('.layui-card-body');
            const header = document.querySelector('.report-header');
            const form = document.getElementById('filterForm');
            const usedHeight = (header ? header.offsetHeight : 0)
                + (form ? form.offsetHeight : 0)
                + 32;
            const tableHeight = Math.max(300, cardBody.clientHeight - usedHeight);
            table.resize('reportTable', { height: tableHeight });
            // 窗口大小变化后重新计算列宽自适应
            setTimeout(autoFitColumns, 100);
        }, 200);
    });
});

// 管理 select 下拉层级：打开的 select 所在的 filter-item 提升到最高
function manageSelectStacking() {
    // 先清除所有 filter-item 的 z-index
    document.querySelectorAll('.filter-item').forEach(function (item) {
        item.style.zIndex = '';
    });
    // 给打开状态的 select 所在的 filter-item 设高层级
    document.querySelectorAll('.layui-form-select.layui-form-selected').forEach(function (sel) {
        var item = sel.closest('.filter-item');
        if (item) item.style.setProperty('z-index', '99999', 'important');
    });
}

// 全局点击修复：点击任何 select 下拉框时确保不被裁剪
document.addEventListener('click', function (e) {
    var sel = e.target.closest('.layui-form-select');
    if (sel) {
        var dl = sel.querySelector('.layui-anim-upbit');
        if (dl) dl.style.setProperty('z-index', '99999', 'important');
        // 遍历父容器强制 overflow: visible
        var p = sel.parentElement;
        while (p && p !== document.body) {
            p.style.setProperty('overflow', 'visible', 'important');
            p = p.parentElement;
        }
    }
    // 延迟执行层叠管理，等待 layui 更新 class
    setTimeout(manageSelectStacking, 50);
});

// 初始化 select 层叠管理观察器（监听 layui-form-selected class 变化）
function initSelectStackingObserver() {
    if (window._selectObserver) window._selectObserver.disconnect();
    var observer = new MutationObserver(function () {
        manageSelectStacking();
    });
    document.querySelectorAll('.layui-form-select').forEach(function (sel) {
        observer.observe(sel, { attributes: true, attributeFilter: ['class'] });
    });
    window._selectObserver = observer;
}
// 首次初始化（已有的 select）
initSelectStackingObserver();

// ========== 用户菜单逻辑 ==========
(function() {
    var avatarBtn = document.getElementById('userAvatarBtn');
    var dropdown = document.getElementById('userDropdown');
    var mask = document.getElementById('userMenuMask');

    function toggleMenu() {
        var isOpen = dropdown.classList.contains('open');
        if (isOpen) closeMenu(); else openMenu();
    }
    function openMenu() {
        dropdown.classList.add('open');
        mask.classList.add('show');
    }
    function closeMenu() {
        dropdown.classList.remove('open');
        mask.classList.remove('show');
    }

    avatarBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMenu();
    });
    mask.addEventListener('click', closeMenu);
    document.addEventListener('click', function(e) {
        if (!document.getElementById('userMenuWrap').contains(e.target)) closeMenu();
    });

    // 加载用户信息
    fetch('/backend/api/userInfo')
        .then(function(r) { return r.json(); })
        .then(function(json) {
            if (json.code === 0 && json.data) {
                var d = json.data;
                var initial = (d.realname || d.username || 'U').charAt(0).toUpperCase();
                document.getElementById('avatarInitial').textContent = initial;
                document.getElementById('udAvatar').textContent = initial;
                document.getElementById('udRealname').textContent = d.realname || d.username;
                document.getElementById('udUsername').textContent = '@' + d.username;
            }
        })
        .catch(function() {});

    // 修改密码弹窗
    var pwdOverlay = document.getElementById('pwdModalOverlay');

    document.getElementById('btnChangePwd').addEventListener('click', function() {
        closeMenu();
        pwdOverlay.classList.add('show');
        document.getElementById('pwdOld').value = '';
        document.getElementById('pwdNew').value = '';
        document.getElementById('pwdConfirm').value = '';
    });
    document.getElementById('pwdModalClose').addEventListener('click', function() {
        pwdOverlay.classList.remove('show');
    });
    document.getElementById('pwdCancelBtn').addEventListener('click', function() {
        pwdOverlay.classList.remove('show');
    });
    pwdOverlay.addEventListener('click', function(e) {
        if (e.target === pwdOverlay) pwdOverlay.classList.remove('show');
    });

    document.getElementById('pwdSubmitBtn').addEventListener('click', function() {
        var oldPwd = document.getElementById('pwdOld').value.trim();
        var newPwd = document.getElementById('pwdNew').value.trim();
        var confirmPwd = document.getElementById('pwdConfirm').value.trim();
        var btn = this;

        if (!oldPwd) { alert('请输入当前密码'); return; }
        if (!newPwd || newPwd.length < 6) { alert('新密码不能少于6位'); return; }
        if (newPwd !== confirmPwd) { alert('两次输入的新密码不一致'); return; }

        btn.disabled = true;
        btn.textContent = '提交中...';

        var fd = new FormData();
        fd.append('old_password', oldPwd);
        fd.append('new_password', newPwd);
        fd.append('__token__', csrfToken);

        fetch('/backend/api/changePassword', { method: 'POST', body: fd })
            .then(function(r) { return r.json(); })
            .then(function(json) {
                btn.disabled = false;
                btn.textContent = '确认修改';
                if (json.code === 0) {
                    alert(json.msg);
                    pwdOverlay.classList.remove('show');
                    window.location.href = '/backend/login';
                } else {
                    alert(json.msg || '修改失败');
                }
            })
            .catch(function() {
                btn.disabled = false;
                btn.textContent = '确认修改';
                alert('网络错误，请重试');
            });
    });

    // 退出登录确认
    var logoutOverlay = document.getElementById('logoutConfirmOverlay');

    document.getElementById('btnLogout').addEventListener('click', function() {
        closeMenu();
        logoutOverlay.classList.add('show');
    });
    document.getElementById('logoutCancelBtn').addEventListener('click', function() {
        logoutOverlay.classList.remove('show');
    });
    logoutOverlay.addEventListener('click', function(e) {
        if (e.target === logoutOverlay) logoutOverlay.classList.remove('show');
    });
    document.getElementById('logoutConfirmBtn').addEventListener('click', function() {
        var fd = new FormData();
        fd.append('__token__', csrfToken);
        fetch('/backend/logout', { method: 'POST', body: fd })
            .then(function() { window.location.href = '/backend/login'; })
            .catch(function() { window.location.href = '/backend/login'; });
    });
})();
</script>
