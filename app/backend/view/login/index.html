<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>体检数据查询 - 登录</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/css/layui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 30%, #0891b2 60%, #06b6d4 100%);
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰圆 */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            top: -200px;
            right: -150px;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            bottom: -150px;
            left: -100px;
            pointer-events: none;
        }

        /* 网格背景纹理 */
        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            display: flex;
            width: 820px;
            max-width: 100%;
            min-height: 520px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25), 0 8px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            backdrop-filter: blur(20px);
            animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 左侧品牌区 */
        .login-brand {
            flex: 1;
            background: linear-gradient(160deg, #0c4a6e, #0369a1, #0891b2);
            padding: 48px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #fff;
            position: relative;
            min-width: 280px;
        }

        .login-brand::after {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(6, 182, 212, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.08) 0%, transparent 40%);
            pointer-events: none;
        }

        .brand-icon {
            font-size: 56px;
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.2));
        }

        .brand-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .brand-subtitle {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .brand-features {
            margin-top: 32px;
            position: relative;
            z-index: 1;
        }

        .brand-features .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 13px;
            opacity: 0.85;
        }

        .brand-features .feature-item .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.7);
            flex-shrink: 0;
        }

        /* 右侧表单区 */
        .login-form {
            flex: 1;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 300px;
        }

        .login-form > * {
            animation: fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .login-form > .form-header    { animation-delay: 0.15s; }
        .login-form > .login-error   { animation-delay: 0.20s; }
        .login-form > .layui-form    { animation-delay: 0.25s; }
        .login-form > .login-footer  { animation-delay: 0.35s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .form-header {
            margin-bottom: 32px;
        }

        .form-header .welcome {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .form-header .form-title {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }

        .layui-form-item {
            margin-bottom: 20px !important;
            clear: both;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
            background: #f8fafc;
        }

        .input-group:focus-within {
            border-color: #0891b2;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        .input-group .input-icon {
            padding: 0 0 0 14px;
            font-size: 18px;
            color: #94a3b8;
            line-height: 1;
            flex-shrink: 0;
            transition: color 0.25s ease;
        }

        .input-group:focus-within .input-icon {
            color: #0891b2;
        }

        .input-group .layui-input {
            height: 46px;
            border: none !important;
            background: transparent !important;
            padding-left: 10px;
            font-size: 14px;
            color: #334155;
            outline: none;
        }

        .input-group .layui-input:focus {
            box-shadow: none !important;
        }

        .input-group .layui-input::placeholder {
            color: #a0afbe;
        }

        .login-btn {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #0369a1, #0891b2) !important;
            border: none !important;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            color: #fff;
            box-shadow: 0 4px 14px rgba(8, 145, 178, 0.35);
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(8, 145, 178, 0.45);
            background: linear-gradient(135deg, #0284c7, #0ea5e9) !important;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-error {
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            margin-bottom: 16px;
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 10px 16px;
        }

        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 4px 0 20px 0;
        }

        .remember-row label {
            font-size: 13px;
            color: #64748b;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0891b2;
            cursor: pointer;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .login-card {
                flex-direction: column;
                min-height: auto;
            }
            .login-brand {
                padding: 32px 28px;
                min-width: auto;
            }
            .login-form {
                padding: 32px 28px;
            }
            .brand-features { display: none; }
        }
    </style>
</head>
<body>
<div class="bg-pattern"></div>

<div class="login-container">
    <div class="login-card">
        <!-- 左侧品牌区 -->
        <div class="login-brand">
            <div class="brand-icon">🏥</div>
            <div class="brand-title">体检数据查询</div>
            <div class="brand-subtitle">PEIS 健康体检管理系统 · 数据查询平台</div>
            <div class="brand-features">
                <div class="feature-item"><span class="dot"></span>多维度数据统计与分析</div>
                <div class="feature-item"><span class="dot"></span>自定义报表快速导出</div>
                <div class="feature-item"><span class="dot"></span>实时精准数据检索</div>
            </div>
        </div>

        <!-- 右侧表单区 -->
        <div class="login-form">
            <div class="form-header">
                <div class="welcome">WELCOME</div>
                <div class="form-title">欢迎登录</div>
            </div>

            <div class="login-error" id="loginError"></div>

            <form class="layui-form" id="loginForm">
                <div class="layui-form-item">
                    <div class="input-group">
                        <span class="input-icon">👤</span>
                        <input type="text" name="username" required lay-verify="required"
                               placeholder="请输入用户名" autocomplete="username"
                               class="layui-input">
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" name="password" required lay-verify="required"
                               placeholder="请输入密码" autocomplete="current-password"
                               class="layui-input">
                    </div>
                </div>
                <div class="remember-row">
                    <label>
                        <input type="checkbox" id="rememberPwd">
                        记住密码
                    </label>
                </div>
                <div class="layui-form-item" style="margin-bottom:0;">
                    <button class="login-btn" lay-submit lay-filter="doLogin">登 录</button>
                </div>
            </form>

            <div class="login-footer">
                PEIS 健康体检管理系统 &copy; 2026
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/layui@2.9.21/dist/layui.js"></script>
<script>
layui.use(['form', 'jquery'], function () {
    var form = layui.form;
    var $ = layui.jquery;
    var errBox = document.getElementById('loginError');
    var $username = $('input[name="username"]');
    var $password = $('input[name="password"]');
    var $remember = $('#rememberPwd');

    // 加载保存的账号密码
    (function loadSaved() {
        var saved = localStorage.getItem('login_remember');
        if (saved) {
            try {
                var data = JSON.parse(saved);
                if (data.username) {
                    $username.val(data.username);
                    $password.val(data.password || '');
                    $remember.prop('checked', true);
                }
            } catch (e) {}
        }
    })();

    form.on('submit(doLogin)', function (data) {
        $.ajax({
            type: 'POST',
            url: '/backend/doLogin',
            data: data.field,
            dataType: 'json',
            success: function (res) {
                if (res.code === 0) {
                    // 记住密码
                    if ($remember.is(':checked')) {
                        localStorage.setItem('login_remember', JSON.stringify({
                            username: data.field.username,
                            password: data.field.password
                        }));
                    } else {
                        localStorage.removeItem('login_remember');
                    }
                    window.location.href = '/backend/report';
                } else {
                    errBox.style.display = 'block';
                    errBox.textContent = res.msg || '登录失败';
                }
            },
            error: function () {
                errBox.style.display = 'block';
                errBox.textContent = '网络错误，请稍后重试';
            }
        });
        return false;
    });
});
</script>
</body>
</html>
